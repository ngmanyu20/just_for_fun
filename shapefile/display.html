<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Panel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f6fa;
            color: #333;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 100vh;
        }

        h2 {
            font-size: 13px;
            font-weight: 700;
            color: #667eea;
            padding-bottom: 6px;
            border-bottom: 2px solid #e9ecef;
            margin-bottom: 8px;
        }

        .panel {
            background: white;
            border-radius: 8px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        /* Select County */
        .control-group label {
            font-weight: 600;
            font-size: 10px;
            color: #495057;
            display: block;
            margin-bottom: 4px;
        }

        .control-group select {
            width: 100%;
            padding: 4px 6px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 11px;
        }

        /* Polygon Info */
        #displayPolygonInfo {
            font-size: 11px;
            line-height: 1.6;
        }

        #displayPolygonInfo h4 {
            font-size: 13px;
            margin-bottom: 6px;
            color: #222;
        }

        #displayPolygonInfo p {
            margin-bottom: 3px;
        }

        #displaySharedInfo {
            font-size: 11px;
            color: #555;
            margin-top: 6px;
        }

        #displayCoordinates {
            font-size: 10px;
            font-family: monospace;
            word-break: break-all;
            margin-top: 8px;
            padding: 6px;
            background: #f8f9fa;
            border-radius: 4px;
            color: #444;
            max-height: 100px;
            overflow-y: auto;
        }

        /* Vertex Info */
        #displayVertexInfo {
            font-size: 11px;
            line-height: 1.6;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 4px;
            min-height: 60px;
        }

        .status-bar {
            font-size: 10px;
            color: #aaa;
            text-align: right;
        }
    </style>
</head>
<body>

    <!-- Select County -->
    <div class="panel">
        <h2>🗃️ Select County</h2>
        <div class="control-group">
            <select id="displayPolygonSelect"></select>
        </div>
    </div>

    <!-- Polygon Information -->
    <div class="panel">
        <h2>📊 Polygon Information</h2>
        <div id="displayPolygonInfo"><p style="color:#999;">Select a polygon to see its information.</p></div>
        <div id="displaySharedInfo"></div>
        <div id="displayCoordinates"></div>
    </div>

    <!-- Vertex Info -->
    <div class="panel">
        <h2>📍 Vertex Info</h2>
        <div id="displayVertexInfo">
            <div style="font-weight:bold;margin-bottom:4px;">No vertex selected</div>
            <div style="font-size:10px;color:#999;">Shift+Click on a vertex to select</div>
        </div>
    </div>

    <div class="status-bar" id="statusBar">Waiting for main window…</div>

    <script>
        const displaySelect   = document.getElementById('displayPolygonSelect');
        const displayInfo     = document.getElementById('displayPolygonInfo');
        const displayShared   = document.getElementById('displaySharedInfo');
        const displayCoords   = document.getElementById('displayCoordinates');
        const displayVertex   = document.getElementById('displayVertexInfo');
        const statusBar       = document.getElementById('statusBar');

        let lastSelectValue = '';
        let suppressChange = false;

        // When the user picks a polygon in this window, drive the main window's select
        displaySelect.addEventListener('change', () => {
            if (suppressChange) return;
            const opener = window.opener;
            if (!opener || opener.closed) return;
            const mainSelect = opener.document.getElementById('polygonSelect');
            if (mainSelect) {
                mainSelect.value = displaySelect.value;
                mainSelect.dispatchEvent(new Event('change'));
            }
        });

        function syncFromOpener() {
            const opener = window.opener;
            if (!opener || opener.closed) {
                statusBar.textContent = 'Main window closed.';
                return;
            }

            try {
                const openerDoc = opener.document;

                // --- Sync polygon select options ---
                const mainSelect = openerDoc.getElementById('polygonSelect');
                if (mainSelect) {
                    const mainValue = mainSelect.value;
                    // Rebuild options only when count or value changes to avoid flicker
                    if (displaySelect.options.length !== mainSelect.options.length ||
                        displaySelect.value !== mainValue) {

                        suppressChange = true;
                        displaySelect.innerHTML = '';
                        for (const opt of mainSelect.options) {
                            const o = document.createElement('option');
                            o.value = opt.value;
                            o.textContent = opt.textContent;
                            displaySelect.appendChild(o);
                        }
                        displaySelect.value = mainValue;
                        suppressChange = false;
                    }
                }

                // --- Sync polygon info ---
                const mainInfo = openerDoc.getElementById('polygonInfo');
                if (mainInfo && mainInfo.innerHTML !== displayInfo.innerHTML) {
                    displayInfo.innerHTML = mainInfo.innerHTML;
                }

                // --- Sync shared info ---
                const mainShared = openerDoc.getElementById('sharedInfo');
                if (mainShared && mainShared.textContent !== displayShared.textContent) {
                    displayShared.textContent = mainShared.textContent;
                }

                // --- Sync coordinates ---
                const mainCoords = openerDoc.getElementById('coordinates');
                if (mainCoords && mainCoords.textContent !== displayCoords.textContent) {
                    displayCoords.textContent = mainCoords.textContent;
                }

                // --- Sync vertex info ---
                const mainVertex = openerDoc.getElementById('vertexInfo');
                if (mainVertex && mainVertex.innerHTML !== displayVertex.innerHTML) {
                    displayVertex.innerHTML = mainVertex.innerHTML;
                }

                statusBar.textContent = `Synced · ${new Date().toLocaleTimeString()}`;

            } catch (e) {
                statusBar.textContent = 'Sync error: ' + e.message;
            }
        }

        // Poll every 300 ms
        setInterval(syncFromOpener, 300);
        syncFromOpener();
    </script>
</body>
</html>
